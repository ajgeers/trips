<!DOCTYPE html>
<html>
    <head>
        <meta charset='utf-8'>
        <meta name='viewport' content='width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no'>

        <title>Arjan Geers | Trips</title>
        <link rel='icon' type='image/png' href='favicon.png'>

        <link rel='stylesheet' href='https://unpkg.com/leaflet@1.9.4/dist/leaflet.css' integrity='sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=' crossorigin=''>
        <script src='https://unpkg.com/leaflet@1.9.4/dist/leaflet.js' integrity='sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=' crossorigin=''></script>
        <script src='https://unpkg.com/d3@7.9.0/dist/d3.min.js' crossorigin=''></script>
        <script src='https://unpkg.com/@turf/turf@7.1.0/turf.min.js'></script>

        <style>
            body {
                padding: 0;
                margin: 0;
            }
            #map {
                height: 100vh;
                width: 100vw;
            }
        </style>

    </head>
    <body>

        <div style="position: absolute; top: 10px; right: 10px; z-index: 1000;">
            <select id="trip-selector" style="padding: 5px; border-radius: 5px; border: 1px solid #ccc;">
                <option value="2016_jordan.csv">Jordan 2016</option>
                <option value="2016_southeast_asia.csv">Southeast Asia 2016</option>
                <option value="2018_japan.csv">Japan 2018</option>
                <option value="2018_south_america.csv" selected>South America 2018</option>
                <option value="2019_japan.csv">Japan 2019</option>
                <option value="2020_portugal.csv">Portugal 2020</option>
                <option value="2023_albania.csv">Albania 2023</option>
                <option value="2024_japan.csv">Japan 2024</option>
            </select>
        </div>

        <div id='map'></div>
        <script>
            // Load the default trip on page load
            document.addEventListener('DOMContentLoaded', function() {
                const defaultTrip = document.getElementById('trip-selector').value;
                loadTripData('./data/' + defaultTrip);
            });
        </script>
        <script src='map.js'></script>

    </body>
</html>
